{% extends "base.html" %}

{% block title %}User Management{% endblock %}

{% block content %}
<div class="page-container">
    <h1>User Management</h1>
    <div class="table-wrapper">
     <table class="data-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Team</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.name }}</td>
                <td>{{ user.email }}</td>
                <td>{{ user.role | capitalize }}</td>
                <td>{{ user.team if user.team else '—' }}</td>
                <td>
                    <form method="POST" action="{{ url_for('auth.reset_password', user_id=user.id) }}">
                        <button type="submit" class="btn-reset"
                            onclick="return confirm('Reset password for {{ user.name }}?')">
                            Reset Password
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
     </table>
    </div>
</div>
{% endblock %}
